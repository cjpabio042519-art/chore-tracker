<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ChoreMaster - Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <h1>🧹 ChoreMaster</h1>
        <p>→ Welcome back!</p>
      </div>
      <div id="login-form">
        <div class="input-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button id="login-btn" class="btn-primary">Login</button>
        <p class="auth-switch">Don't have an account? <a href="#" id="show-signup">+ Sign Up</a></p>
      </div>
      <div id="signup-form" style="display: none;">
        <div class="input-group">
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="input-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Create a password" autocomplete="new-password">
        </div>
        <button id="signup-btn" class="btn-primary">Create Account</button>
        <p class="auth-switch">Already have an account? <a href="#" id="show-login">Login</a></p>
      </div>
      <div id="message" class="message"></div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
