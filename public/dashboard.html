<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ChoreMaster - Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="dashboard-container">
    <nav class="navbar">
      <div class="nav-brand">🧹 ChoreMaster</div>
      <button id="logout-btn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </nav>
    <main class="dashboard-main">
      <div class="card weekly-card">
        <h2>📅 Weekly summary</h2>
        <div class="week-days" id="week-days"></div>
        <div class="weekly-goal">
          <p><strong>🎯 Weekly goal</strong> <span id="goal-stats">0/0 tasks completed</span></p>
          <div class="progress-bar"><div class="progress-fill" id="goal-progress" style="width:0%"></div></div>
        </div>
        <a href="#" id="see-all-tasks" class="see-all-link">See all tasks →</a>
      </div>
      <div class="card tasks-card">
        <div class="tasks-header">
          <h2>📋 Today's tasks</h2>
          <button id="add-task-btn" class="btn-add"><i class="fas fa-plus"></i> Add Task</button>
        </div>
        <div id="today-tasks-list" class="tasks-list"><div class="empty-state">✨ No tasks for today. Add one!</div></div>
      </div>
    </main>
    <div id="task-modal" class="modal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3 id="modal-title">Add New Task</h3>
        <form id="task-form">
          <div class="input-group"><label for="task-title">Task title *</label><input type="text" id="task-title" required placeholder="e.g., Grocery shopping"></div>
          <div class="input-group"><label for="task-date">Date *</label><input type="date" id="task-date" required></div>
          <div class="input-group"><label for="task-time">Time</label><input type="time" id="task-time"></div>
          <button type="submit" class="btn-primary">Save Task</button>
        </form>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
